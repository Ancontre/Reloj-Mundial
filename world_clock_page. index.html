<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj Mundial · México</title>
<style>
  :root {
    --bg: #f8f7f4;
    --bg2: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text2: #666;
    --accent: #185FA5;
    --badge-ahead-bg: #EAF3DE;
    --badge-ahead-text: #3B6D11;
    --badge-behind-bg: #FAEEDA;
    --badge-behind-text: #854F0B;
    --badge-same-bg: #f0f0f0;
    --badge-same-text: #666;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  [data-theme="dark"] {
    --bg: #141414;
    --bg2: #1e1e1e;
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f0;
    --text2: #999;
    --accent: #378ADD;
    --badge-ahead-bg: #1a2e0e;
    --badge-ahead-text: #8ecf5a;
    --badge-behind-bg: #2e1f0a;
    --badge-behind-text: #f5c07a;
    --badge-same-bg: #2a2a2a;
    --badge-same-text: #999;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  header { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  h1 { font-size: 1.3rem; font-weight: 600; color: var(--text); }
  h1 span { color: var(--accent); }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sim-row { display: flex; align-items: center; gap: 8px; }
  .sim-row label { font-size: 13px; color: var(--text2); }
  input[type=time] { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--text); outline: none; }
  input[type=time]:focus { border-color: var(--accent); }
  button { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 13px; color: var(--text); cursor: pointer; transition: background 0.15s; }
  button:hover { background: var(--border); }
  .toggle-theme { font-size: 18px; background: none; border: none; cursor: pointer; padding: 4px 8px; }
  main { max-width: 1100px; margin: 0 auto; padding: 0.5rem 1.5rem 3rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow); transition: border-color 0.2s; }
  .card.anchor { border: 2px solid var(--accent); }
  .flag { font-size: 22px; margin-bottom: 8px; display: block; }
  .city { font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; letter-spacing: 0.02em; }
  .time { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .date { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 99px; margin-top: 8px; font-weight: 500; }
  .badge-ahead { background: var(--badge-ahead-bg); color: var(--badge-ahead-text); }
  .badge-behind { background: var(--badge-behind-bg); color: var(--badge-behind-text); }
  .badge-same { background: var(--badge-same-bg); color: var(--badge-same-text); }
  footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text2); }
  @media (max-width: 500px) { .grid { grid-template-columns: repeat(2, 1fr); } h1 { font-size: 1.1rem; } }
</style>
</head>
<body>
<header>
  <h1>🌍 Reloj Mundial <span>· México</span></h1>
  <div class="controls">
    <div class="sim-row">
      <label>Simular México:</label>
      <input type="time" id="simTime">
      <button onclick="resetSim()">Ahora</button>
    </div>
    <button class="toggle-theme" id="themeBtn" title="Cambiar tema">🌙</button>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
</main>
<footer>Actualizado en tiempo real · Hora base: Ciudad de México (CST/CDT)</footer>

<script>
const zones = [
  { label: "Ciudad de México", tz: "America/Mexico_City", flag: "🇲🇽", anchor: true },
  { label: "Nueva York", tz: "America/New_York", flag: "🇺🇸" },
  { label: "San Francisco", tz: "America/Los_Angeles", flag: "🇺🇸" },
  { label: "Buenos Aires", tz: "America/Argentina/Buenos_Aires", flag: "🇦🇷" },
  { label: "São Paulo", tz: "America/Sao_Paulo", flag: "🇧🇷" },
  { label: "Chile (Santiago)", tz: "America/Santiago", flag: "🇨🇱" },
  { label: "Europa Central", tz: "Europe/Paris", flag: "🇪🇺" },
  { label: "Londres", tz: "Europe/London", flag: "🇬🇧" },
  { label: "Dubái", tz: "Asia/Dubai", flag: "🇦🇪" },
  { label: "India (Mumbai)", tz: "Asia/Kolkata", flag: "🇮🇳" },
  { label: "Singapur", tz: "Asia/Singapore", flag: "🇸🇬" },
  { label: "China (Pekín)", tz: "Asia/Shanghai", flag: "🇨🇳" },
  { label: "Tokio", tz: "Asia/Tokyo", flag: "🇯🇵" },
];

let simBase = null;

function getOffsetHours(tz1, tz2, base) {
  const toH = tz => {
    const s = new Date(base).toLocaleString("en-US", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false });
    const [h, m] = s.split(":").map(Number);
    return h + m / 60;
  };
  let d = toH(tz2) - toH(tz1);
  if (d > 12) d -= 24;
  if (d < -12) d += 24;
  return Math.round(d * 2) / 2;
}

function render(baseDate) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  zones.forEach(z => {
    const timeStr = baseDate.toLocaleTimeString("es-MX", { timeZone: z.tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    const dateStr = baseDate.toLocaleDateString("es-MX", { timeZone: z.tz, weekday: "short", day: "numeric", month: "short" });
    let badge = "", cls = "";
    if (!z.anchor) {
      const diff = getOffsetHours("America/Mexico_City", z.tz, baseDate);
      if (diff === 0) { badge = "Misma hora"; cls = "badge-same"; }
      else if (diff > 0) { badge = `+${diff % 1 === 0 ? diff : diff}h`; cls = "badge-ahead"; }
      else { badge = `${diff % 1 === 0 ? diff : diff}h`; cls = "badge-behind"; }
    }
    const card = document.createElement("div");
    card.className = "card" + (z.anchor ? " anchor" : "");
    card.innerHTML = `<span class="flag">${z.flag}</span><div class="city">${z.label}</div><div class="time">${timeStr}</div><div class="date">${dateStr}</div>${badge ? `<span class="badge ${cls}">${badge}</span>` : ""}`;
    grid.appendChild(card);
  });
}

function resetSim() {
  simBase = null;
  document.getElementById("simTime").value = "";
  render(new Date());
}

document.getElementById("simTime").addEventListener("change", e => {
  const val = e.target.value;
  if (!val) { resetSim(); return; }
  const [h, m] = val.split(":").map(Number);
  const now = new Date();
  const mxStr = now.toLocaleString("en-US", { timeZone: "America/Mexico_City", hour: "2-digit", minute: "2-digit", hour12: false });
  const [mxH, mxM] = mxStr.split(":").map(Number);
  const diff = (h - mxH) * 60 + (m - mxM);
  simBase = new Date(now.getTime() + diff * 60000);
  render(simBase);
});

const btn = document.getElementById("themeBtn");
const saved = localStorage.getItem("theme") || "light";
if (saved === "dark") { document.documentElement.setAttribute("data-theme", "dark"); btn.textContent = "☀️"; }

btn.addEventListener("click", () => {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
  btn.textContent = isDark ? "🌙" : "☀️";
  localStorage.setItem("theme", isDark ? "light" : "dark");
});

render(new Date());
setInterval(() => { if (!document.getElementById("simTime").value) render(new Date()); }, 1000);
</script>
</body>
</html>
